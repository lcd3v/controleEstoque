version: '3.8'

services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: leonardod3v
      MYSQL_DATABASE: estoque_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pleonardod3v"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
  app:
    build: .
    container_name: app-estoque
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    
volumes:
  db_data: